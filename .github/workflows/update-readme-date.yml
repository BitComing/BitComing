name: Update README Daily Panel

on:
  schedule:
    - cron: "3 0 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update daily panel in README
        id: update_readme
        shell: bash
        run: |
          python3 scripts/update_readme_panel.py

          if git diff --quiet README.md assets/daily-panel.svg; then
            echo "README daily panel is already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.update_readme.outputs.changed == 'true'
        shell: bash
        run: |
          today="$(TZ='Asia/Shanghai' date +'%Y/%m/%d')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/daily-panel.svg .github/readme-quotes.txt scripts/update_readme_panel.py
          git commit -m "chore: update README daily panel for ${today}"
          git push
