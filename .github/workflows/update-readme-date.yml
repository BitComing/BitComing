name: Update README Date

on:
  schedule:
    - cron: "3 0 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update date in README
        id: update_readme
        shell: bash
        run: |
          read -r today progress < <(TZ='Asia/Shanghai' python3 -c "from datetime import datetime; from zoneinfo import ZoneInfo; now = datetime.now(ZoneInfo('Asia/Shanghai')); year_start = datetime(now.year, 1, 1, tzinfo=now.tzinfo); next_year_start = datetime(now.year + 1, 1, 1, tzinfo=now.tzinfo); days_in_year = (next_year_start - year_start).days; print(now.strftime('%Y/%m/%d'), f'{now.timetuple().tm_yday / days_in_year * 100:.2f}%')")
          TODAY="$today" PROGRESS="$progress" python3 -c "from pathlib import Path; import os; readme = Path('README.md'); lines = readme.read_text(encoding='utf-8').splitlines(); lines[0] = f\"Date: {os.environ['TODAY']} | Year Progress: {os.environ['PROGRESS']}\"; readme.write_text('\\n'.join(lines) + '\\n', encoding='utf-8')"

          if git diff --quiet README.md; then
            echo "README date is already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.update_readme.outputs.changed == 'true'
        shell: bash
        run: |
          today="$(TZ='Asia/Shanghai' date +'%Y/%m/%d')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README date to ${today}"
          git push
